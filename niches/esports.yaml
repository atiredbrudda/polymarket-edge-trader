# eSports niche configuration
# First niche for Polymarket Smart Money Tracker

tag_id: 64               # Polymarket tag ID for eSports markets (integer, from /tags/slug/esports)
slug: esports            # File slug for config lookup
min_positions: 30        # Minimum positions for trader to qualify for scoring
scoring_window_days: 30  # Rolling window for CLV/ROI/Sharpe calculation
entity_fields:           # Entity types to extract from market questions
  - game                 # e.g., "CS2", "LoL", "Dota 2"
  - team                 # e.g., "FaZe", "NAVI", "T1"
  - player               # e.g., "s1mple", "Faker"
  - tournament           # e.g., "IEM Katowice", "Worlds 2025"

# Allowed event_slug prefixes (first segment before the first hyphen).
# Markets whose slug prefix is not in this list are rejected at discover time.
# Polymarket's esports tag includes some non-esports markets; this filters them.
event_slug_prefixes:
  # Game codes
  - cs2
  - csgo
  - dota2
  - dota
  - lol
  - val
  - valorant
  - hok
  - r6siege
  - sc2
  - codmw
  - mlbb
  - rl
  - ow
  - apex
  - fncs
  - vgc
  - cs
  - counter
  - call
  - rainbow
  - league
  # Tournament / org names
  - blast
  - blasttv
  - blastopen
  - iem
  - pgl
  - esl
  - vct
  - ewc
  - starladder
  - dreamhack
  - dreamleague
