[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "polymarket-tracker"
version = "0.1.0"
description = "Category-agnostic intelligence pipeline for Polymarket prediction markets"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "py-clob-client>=0.34.5",
    "sqlalchemy>=2.0.46",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.0",
    "httpx>=0.28.1",
    "tenacity>=9.1.3",
    "loguru>=0.7.3",
    "python-dotenv>=1.0",
    "pyyaml>=6.0",
    "python-telegram-bot>=22.6",
    "click>=8.1",
    "pytimeparse>=1.1.8",
    "rich>=13.0",
    "web3>=6.0.0",
    "duckdb>=1.0.0",
]

[project.scripts]
polymarket = "src.cli.commands:cli"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov",
    "pytest-mock",
    "pyarrow>=23.0.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]
